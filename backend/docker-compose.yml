services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: career_copilot
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  valkey:
    image: valkey/valkey:8
    ports: ["6379:6379"]
    volumes: ["valkeydata:/data"]

volumes:
  pgdata:
  valkeydata:
